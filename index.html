<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Timothy Kozuch</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 2rem;
        background: black;
      }
      header img {
        width: 150px;
        height: 104px;
        object-fit: cover;
      }

      nav {
        display: flex;
        gap: 0.25rem;
        margin-left: 1rem;
      }
      .menu {
        position: relative;
      }
      .menu > button {
        padding: 0.5rem 1rem;
        background: #444;
      }
      .menu ul {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        min-width: 180px;
        background: #444;
        z-index: 1;
      }
      .menu.open ul {
        display: block;
      }
      .group-label {
        padding: 0.4rem 1rem 0.1rem;
        font-size: 0.7rem;
        text-transform: uppercase;
      }
      .menu ul a {
        display: block;
        padding: 0.35rem 1rem;
        color: white;
      }

      .carousel {
        background: #444;
        padding: 4rem 10rem;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .carousel > button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 8rem;
        padding: 0 1rem;
        background: none;
      }
      .carousel > button:first-child {
        left: 0;
      }
      .carousel > button:last-child {
        right: 0;
      }
      .info {
        display: flex;
        gap: 4rem;
        align-items: center;
      }
      .thumb {
        width: 480px;
        height: 320px;
        background: black;
        flex-shrink: 0;
      }
      .text h2 {
        font-size: 2rem;
        margin-bottom: 0.8rem;
      }
      .text p {
        font-size: 1.2rem;
      }
      .text a {
        display: block;
        margin-top: 1rem;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="img/logo.png" alt="Timothy Kozuch" />
      <h1>Timothy Kozuch</h1>
      <nav>
        <div class="menu">
          <button>Technical Skills / Resume ▾</button>
          <ul>
            <li><a href="me/about.html">About Me</a></li>
            <li>
              <a href="me/T.Kozuch_CS_PSU_Spring2026.pdf">Resume (PDF)</a>
            </li>
            <li><a href="me/skills.html">Skills</a></li>
          </ul>
        </div>

        <div class="menu">
          <button>Technical Projects ▾</button>
          <ul>
            <li class="group-label">C</li>
            <li><a href="projects/malloc.html">Malloc</a></li>
            <li><a href="projects/jbod.html">JBOD</a></li>
            <li class="group-label">Python</li>
            <li><a href="projects/rsa.html">RSA</a></li>
            <li class="group-label">Java</li>
            <li><a href="projects/scheduler.html">Course Scheduler</a></li>
            <li class="group-label">VBA</li>
            <li><a href="projects/excel.html">Excel Automation</a></li>
            <li class="group-label">Verilog</li>
            <li><a href="projects/cpu.html">CPU</a></li>
          </ul>
        </div>

        <div class="menu">
          <button>Video Games ▾</button>
          <ul>
            <li class="group-label">Python</li>
            <li><a href="games/loop-hole.html">Loop-Hole</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!--
  Carousel: one <div class="slide"> per project.
  JS reads the slides array, shows one at a time by toggling display.
  ‹ and › buttons call prev()/next(). No dots, no auto-advance, no CSS transitions.
-->
    <div class="carousel" id="carousel">
      <button onclick="prev()">&#8249;</button>

      <div class="info" id="info"></div>

      <button onclick="next()">&#8250;</button>
    </div>

    <!-- Slide data — hidden, never rendered directly -->
    <template id="slides">
      <div
        data-href="me/about.html"
        data-title="About Me"
        data-desc="CS student, game developer, and programmer."></div>
      <div
        data-href="me/T_Kozuch_CS_PSU_Spring2026.pdf"
        data-title="Resume"
        data-desc="My full resume as a PDF download."></div>
      <div
        data-href="me/skills.html"
        data-title="Skills"
        data-desc="Languages, tools, and technologies I work with."></div>
      <div
        data-href="projects/malloc.html"
        data-title="Malloc — C"
        data-desc="Custom dynamic memory allocator with splitting, coalescing, and first-fit placement."></div>
      <div
        data-href="projects/jbod.html"
        data-title="JBOD — C"
        data-desc="Storage driver with LRU cache and network support."></div>
      <div
        data-href="projects/rsa.html"
        data-title="RSA — Python"
        data-desc="Implementation of the RSA public-key encryption algorithm."></div>
      <div
        data-href="projects/scheduler.html"
        data-title="Course Scheduler — Java"
        data-desc="Role-based scheduling app with Swing GUI and SQL backend."></div>
      <div
        data-href="projects/excel.html"
        data-title="Excel Automation — VBA"
        data-desc="Macros automating engineering workflows at Leading Technologies."></div>
      <div
        data-href="projects/cpu.html"
        data-title="CPU Design — Verilog"
        data-desc="Pipelined RISC-V CPU with ALU, control unit, and memory hierarchy."></div>
      <div
        data-href="games/loop-hole.html"
        data-title="Loop-Hole — Python"
        data-desc="2D platformer where time loops are the core mechanic. GMTK 2025 Game Jam."></div>
    </template>

    <script>
      // Dropdowns
      document.querySelectorAll(".menu > button").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const isOpen = btn.parentElement.classList.contains("open");
          document
            .querySelectorAll(".menu")
            .forEach((m) => m.classList.remove("open"));
          if (!isOpen) btn.parentElement.classList.add("open");
        });
      });
      document.addEventListener("click", () =>
        document
          .querySelectorAll(".menu")
          .forEach((m) => m.classList.remove("open")),
      );

      // Carousel
      const slides = [...document.getElementById("slides").content.children];
      const info = document.getElementById("info");
      let cur = 0;

      function show() {
        const s = slides[cur].dataset;
        info.innerHTML = `<div class="thumb"></div><div class="text"><h2>${s.title}</h2><p>${s.desc}</p><a href="${s.href}">Visit page →</a></div>`;
      }

      function prev() {
        cur = (cur - 1 + slides.length) % slides.length;
        show();
      }
      function next() {
        cur = (cur + 1) % slides.length;
        show();
      }

      show();
    </script>
  </body>
</html>
